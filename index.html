<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teacher Leave Calendar · TOUCH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#15357B; --ink:#16202E; --muted:#5C6779;
  --display:"Sora","Plus Jakarta Sans",system-ui,sans-serif;
  --annual:#2E9E50; --mc:#E8472B; --urgent:#EBB12A; --unpaid:#15335E; --others:#1F9FE6;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:var(--display); color:var(--ink); min-height:100%;
  display:flex; align-items:flex-start; justify-content:center; padding:34px 18px 60px;
  background:
    radial-gradient(60% 50% at 12% 8%, rgba(31,159,230,.18), transparent 70%),
    radial-gradient(55% 45% at 88% 0%, rgba(46,158,80,.16), transparent 70%),
    radial-gradient(70% 60% at 50% 110%, rgba(21,53,123,.14), transparent 70%),
    linear-gradient(180deg,#eef3fb,#e7edf7);
  background-attachment:fixed;
}
.card{position:relative;width:100%;max-width:880px;border-radius:22px;padding:24px 26px 28px;background:rgba(255,255,255,.78);backdrop-filter:blur(26px) saturate(160%);-webkit-backdrop-filter:blur(26px) saturate(160%);border:1px solid rgba(255,255,255,.7);border-top:5px solid var(--blue);box-shadow:0 16px 48px rgba(14,36,86,.16), inset 0 1px 0 rgba(255,255,255,.7)}
.head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.title{font-family:var(--display);font-weight:800;font-size:20px;color:var(--ink);line-height:1.2}
.title small{font-weight:700;font-size:14px;color:var(--blue);margin-left:6px}
.sub{display:block;font-size:12px;color:var(--muted);margin-top:4px;max-width:520px}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.seg{display:inline-flex;background:rgba(20,33,50,.06);border-radius:999px;padding:3px}
.seg button{border:none;background:transparent;font-family:var(--display);font-weight:700;font-size:11.5px;color:var(--muted);padding:5px 12px;border-radius:999px;cursor:pointer;transition:all .15s}
.seg button.on{background:#fff;color:var(--blue);box-shadow:0 2px 8px -3px rgba(20,33,50,.3)}
.keys{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 18px}
.key{display:inline-flex;align-items:center;gap:7px;font-family:var(--display);font-weight:700;font-size:11.5px;padding:5px 11px;border-radius:999px}
.key i{width:11px;height:11px;border-radius:4px;display:inline-block}
.section-label{font-family:var(--display);font-weight:800;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--blue);margin:0 0 9px}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.leg{display:inline-flex;align-items:center;gap:8px;font-family:var(--display);font-weight:600;font-size:12.5px;color:var(--ink);cursor:pointer;background:transparent;border:1px solid rgba(20,33,50,.10);border-radius:999px;padding:5px 13px 5px 6px;transition:transform .15s cubic-bezier(.2,.8,.2,1),box-shadow .15s,background .15s,border-color .15s,opacity .15s}
.leg:hover{transform:translateY(-1px)}
.leg .av{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;background:linear-gradient(135deg,#2f5fb3,#15357B)}
.leg .cnt{font-weight:800;font-size:10.5px;color:var(--muted);background:rgba(20,33,50,.06);border-radius:999px;padding:1px 6px;margin-left:1px}
.leg.is-active{background:rgba(255,255,255,.92);border-color:rgba(20,33,50,.18);box-shadow:0 6px 16px -8px rgba(20,33,50,.30)}
.leg.is-active .av{background:linear-gradient(135deg,#1f9fe6,#15357B)}
.leg.is-dim{opacity:.38}
.leg.is-pt{cursor:default;opacity:.5}
.leg.is-pt .av{background:linear-gradient(135deg,#aab3c2,#7d8798)}
.leg.is-pt:hover{transform:none}
.leg.is-zero .cnt{opacity:.7}
.pt-note{font-size:11px;color:var(--muted);margin-top:8px}
.stage{margin-top:20px}
.fade{animation:fade .26s ease both}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.prompt{text-align:center;color:var(--muted);font-size:13.5px;font-weight:600;padding:46px 10px;border:1px dashed rgba(20,33,50,.14);border-radius:16px;background:rgba(255,255,255,.4)}
.stage-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.stage-head .who{width:40px;height:40px;border-radius:50%;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;background:linear-gradient(135deg,#1f9fe6,#15357B);box-shadow:0 6px 16px -8px rgba(21,53,123,.6)}
.stage-head h2{margin:0;font-family:var(--display);font-weight:800;font-size:17px;color:var(--ink)}
.stage-head .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
.back{margin-left:auto;cursor:pointer;border:1px solid rgba(20,33,50,.12);background:rgba(255,255,255,.7);border-radius:999px;padding:6px 14px;font-family:var(--display);font-weight:700;font-size:12px;color:var(--blue);transition:background .15s,transform .15s}
.back:hover{background:#fff;transform:translateY(-1px)}
.months{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.mcard{border-radius:14px;padding:12px 13px 13px;min-height:104px;background:rgba(255,255,255,.55);border:1px solid rgba(20,33,50,.08);cursor:pointer;transition:transform .16s cubic-bezier(.2,.8,.2,1),box-shadow .16s,background .16s;display:flex;flex-direction:column}
.mcard:hover{transform:translateY(-3px);box-shadow:0 10px 22px -12px rgba(20,33,50,.32);background:rgba(255,255,255,.78)}
.mcard.is-empty{background:rgba(20,33,50,.02);border-color:transparent;cursor:default;opacity:.85}
.mcard.is-empty:hover{transform:none;box-shadow:none}
.mcard .mtop{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:9px}
.mcard .mname{font-family:var(--display);font-weight:800;font-size:14px;color:var(--ink)}
.mcard .total{font-weight:800;font-size:10.5px;color:var(--muted);background:rgba(20,33,50,.06);border-radius:999px;padding:1px 7px}
.mcard .none{font-size:11px;color:var(--muted);font-weight:600;margin-top:auto}
.tchips{display:flex;flex-wrap:wrap;gap:5px;margin-top:auto}
.tchip{display:inline-flex;align-items:center;gap:4px;font-family:var(--display);font-weight:800;font-size:10.5px;padding:2px 7px;border-radius:8px;border:1px solid transparent;color:var(--c);background:color-mix(in srgb, var(--c) 15%, #fff);border-color:color-mix(in srgb, var(--c) 28%, #fff)}
.cal-wrap{margin-top:4px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .dow{font-family:var(--display);font-weight:800;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--blue);text-align:center;padding:4px 0}
.cal .dow.we{color:var(--muted)}
.day{position:relative;min-height:54px;border-radius:9px;padding:6px 7px;background:rgba(255,255,255,.5);border:1px solid rgba(20,33,50,.06);display:flex;flex-direction:column}
.day.blank{background:transparent;border-color:transparent}
.day.we{background:rgba(20,33,50,.025)}
.day.rest{background:rgba(20,33,50,.05)}
.day.rest .num{color:var(--muted)}
.day .num{font-family:var(--display);font-weight:700;font-size:12px;color:var(--ink)}
.day.we .num{color:var(--muted)}
.day.has{--c:var(--annual);color:var(--c);background:color-mix(in srgb, var(--c) 17%, #fff);border-color:color-mix(in srgb, var(--c) 30%, #fff)}
.day.has .num{color:var(--c)}
.day .tag{margin-top:auto;font-family:var(--display);font-weight:800;font-size:10px;display:inline-flex;align-items:center;gap:3px}
.day .half{position:absolute;top:5px;right:6px;font-size:9px;font-weight:800;background:color-mix(in srgb, var(--c) 22%, #fff);color:var(--c);border-radius:6px;padding:0 4px;line-height:14px}
.minis{display:flex;flex-wrap:wrap;gap:3px;margin-top:auto}
.mini{font-size:9px;font-weight:800;padding:1px 4px;border-radius:5px;color:var(--c);background:color-mix(in srgb,var(--c) 16%,#fff);border:1px solid color-mix(in srgb,var(--c) 30%,#fff)}
.cal-foot{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.databar{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
.ghost{border:1px solid rgba(20,33,50,.14);background:rgba(255,255,255,.7);border-radius:999px;padding:5px 13px;font-family:var(--display);font-weight:700;font-size:11.5px;color:var(--blue);cursor:pointer;transition:background .15s,transform .15s}
.ghost:hover{background:#fff;transform:translateY(-1px)}
.dstat{font-size:11px;color:var(--muted);font-weight:600}
.datapanel{margin-top:12px;padding:14px 15px;border-radius:14px;background:rgba(255,255,255,.55);border:1px solid rgba(20,33,50,.10)}
.datapanel[hidden]{display:none}
.dhint{font-size:11.5px;color:var(--muted);margin:0 0 10px;line-height:1.55}
.dhint b{color:var(--ink);font-weight:700}
.datapanel input[type=file]{font-size:12px;margin-bottom:10px;display:block;color:var(--muted)}
.datapanel textarea{width:100%;min-height:88px;border-radius:10px;border:1px solid rgba(20,33,50,.14);padding:9px 11px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;resize:vertical;background:#fff;color:var(--ink)}
.drow{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.btn{border:none;background:var(--blue);color:#fff;border-radius:999px;padding:7px 16px;font-family:var(--display);font-weight:700;font-size:12px;cursor:pointer;transition:transform .15s,opacity .15s}
.btn:hover{transform:translateY(-1px);opacity:.94}
@media (max-width:680px){.card{padding:20px 16px 24px}.months{grid-template-columns:repeat(2,1fr)}.cal{gap:4px}.day{min-height:48px;padding:5px}}
</style>
</head>

    out[y]={ft:{}};seen[y]=new Set();
    ROSTER.forEach(t=>out[y].ft[t]=[]);
    if(SEED[y])for(const t in SEED[y])SEED[y][t].forEach(r=>{const k=t+"|"+r.d+"|"+r.t+"|"+(r.h?1:0);if(!seen[y].has(k)){seen[y].add(k);(out[y].ft[t]??=[]).push({...r});}});
  });
  custom.forEach(r=>{const k=r.teacher+"|"+r.date+"|"+r.type+"|"+(r.half?1:0);if(seen[r.year].has(k))return;seen[r.year].add(k);(out[r.year].ft[r.teacher]??=[]).push({d:r.date,t:r.type,h:!!r.half});});
  for(const y in out)for(const t in out[y].ft)out[y].ft[t].sort((a,b)=>a.d<b.d?-1:a.d>b.d?1:0);
  return out;
}
let custom=loadCustom();
let DATA=buildData(custom);

const MONTH_CARD={en:["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"],zh:["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"]};
const MONTH_FULL={en:["January","February","March","April","May","June","July","August","September","October","November","December"],zh:["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"]};
const DOWS={en:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],zh:["周一","周二","周三","周四","周五","周六","周日"]};
const STR={
 en:{title:"Teacher Leave Calendar",sel:"Select Teacher",prompt:"👆 Select a teacher to view their leave across the year",back:"← Back to year",noLeave:"No leave this month",pt:"Part-time",rest:"Rest",ptNote:"11 full-time teachers",upload:"⤓ Upload data",dhint:`<b>CSV</b> — one record per line: <b>teacher, date, type, half</b>. Date: <b>2026-07-03</b> or <b>03/07/2026</b>. Type: annual / mc / urgent / unpaid / others. Half: leave blank or <b>0.5</b>. New years are added automatically; data is saved in this browser.`,addBtn:"Add data",clearBtn:"Clear uploads",pastePh:"Kuna, 2026-07-03, annual\nDarshni, 03/07/2026, mc, 0.5",statusMsg:(r)=>`Added ${r.added} · ${r.dup} duplicate(s) skipped${r.err?` · ${r.err} error line(s)`:""}`,ovMeta:(y)=>`${y} leave overview · tap a month for daily detail`,mMeta:(m,y,d)=>`${MONTH_FULL.en[m]} ${y} · ${d} total`,h2:(n,m)=>`${n} · ${MONTH_FULL.en[m]}`,sub:(y,r)=>`TOUCH English · Tap a teacher, then a month for daily detail · ${y} data: ${r}`,range:{2025:"full year",2026:"Jan–Jun"},days:(n)=>{const v=Number.isInteger(n)?n:n.toFixed(1);return v+(n===1?" day":" days");}},
 zh:{title:"老师请假年历",sel:"选择老师",prompt:"👆 选择一位老师，查看 TA 的整年请假分布",back:"← 返回年历",noLeave:"本月无请假",pt:"兼职",rest:"休息",ptNote:"全职老师 11 位",upload:"⤓ 上传数据",dhint:`<b>CSV</b> 格式，每行一条：<b>老师, 日期, 假别, 半天</b>。日期 <b>2026-07-03</b> 或 <b>03/07/2026</b>。假别：annual / mc / urgent / unpaid / others。半天：留空 或 <b>0.5</b>。新年份会自动加入；数据保存在此浏览器本地。`,addBtn:"加入数据",clearBtn:"清除上传",pastePh:"Kuna, 2026-07-03, annual\nDarshni, 03/07/2026, mc, 0.5",statusMsg:(r)=>`已加入 ${r.added} 条 · 跳过重复 ${r.dup}${r.err?` · 错误 ${r.err} 行`:""}`,ovMeta:(y)=>`${y} 全年请假分布 · 点月份看每天明细`,mMeta:(m,y,d)=>`${y}年${MONTH_FULL.zh[m]} · 共 ${d}`,h2:(n,m)=>`${n} · ${MONTH_FULL.zh[m]}`,sub:(y,r)=>`TOUCH English · 点老师看整年分布，点月份看每天明细 · ${y} 数据：${r}`,range:{2025:"全年",2026:"1–6月"},days:(n)=>{const v=Number.isInteger(n)?n:n.toFixed(1);return v+" 天";}}
};

let lang="en", year=Math.max(...Object.keys(DATA).map(Number)), sel=null, selMonth=null;
const S=()=>STR[lang];
const FT=()=>DATA[year].ft;
function initials(name){const p=name.replace("Sir ","").trim();return p[0].toUpperCase();}
function totalDays(recs){return recs.reduce((s,r)=>s+(r.h?0.5:1),0);}
/* rest-day rotation: weeks start Sunday; anchor = Sun 4 Jan 2026.
   Group A (Darshni/Kuna/Yaamini) works Sun on anchor week -> rest Mon+Tue; opposite group rests Sun+Mon.
   Each week the partner day flips between Sun and Tue (Mon always rest for both). */
const GROUP_A=["Darshni","Kuna","Yaamini"];
function dnum(y,m,d){return Math.floor(Date.UTC(y,m,d)/86400000);}
const REST_ANCHOR=dnum(2026,0,4);
function isRest(teacher,y,m,day){
  const dow=new Date(Date.UTC(y,m,day)).getUTCDay();      // 0=Sun..6=Sat
  const weekStart=dnum(y,m,day)-dow;                      // Sunday of this week
  const parity=((Math.round((weekStart-REST_ANCHOR)/7)%2)+2)%2;
  const inA=GROUP_A.includes(teacher);
  const rest=(parity===0)?(inA?[1,2]:[0,1]):(inA?[0,1]:[1,2]);
  return rest.includes(dow);
}

function dataRange(){
  const ft=FT();let min=12,max=-1;
  Object.values(ft).forEach(recs=>recs.forEach(r=>{const m=+r.d.slice(5,7)-1;if(m<min)min=m;if(m>max)max=m;}));
  if(max<0)return lang==="en"?"no data":"暂无数据";
  return min===max?MONTH_CARD[lang][min]:`${MONTH_CARD[lang][min]}–${MONTH_CARD[lang][max]}`;
}
function renderYearSeg(){
  const seg=document.getElementById("yearSeg");
  const years=Object.keys(DATA).map(Number).sort((a,b)=>a-b);
  seg.innerHTML=years.map(y=>`<button data-year="${y}"${y===year?' class="on"':''}>${y}</button>`).join("");
}
function renderDataBar(){
  document.getElementById("dataToggle").textContent=S().upload;
  document.getElementById("dhint").innerHTML=S().dhint;
  document.getElementById("addBtn").textContent=S().addBtn;
  document.getElementById("clearBtn").textContent=`${S().clearBtn} (${custom.length})`;
  document.getElementById("pasteIn").placeholder=S().pastePh;
}
function renderChrome(){
  document.getElementById("title").innerHTML=`${S().title} <small>${year}</small>`;
  document.getElementById("sub").textContent=S().sub(year,dataRange());
  document.getElementById("selLabel").textContent=S().sel;
  document.getElementById("ptNote").textContent=S().ptNote;
  document.querySelectorAll("#langSeg button").forEach(b=>b.classList.toggle("on",b.dataset.lang===lang));
}
function renderKeys(){
  const wrap=document.getElementById("keys");wrap.innerHTML="";
  ORDER.forEach(k=>{const c=cvar(TYPE_VAR[k]);const el=document.createElement("span");el.className="key";el.style.color=c;el.style.background=`color-mix(in srgb, ${c} 13%, #fff)`;el.style.border=`1px solid color-mix(in srgb, ${c} 26%, #fff)`;el.innerHTML=`<i style="background:${c}"></i>${TYPE_LABEL[lang][k]}`;wrap.appendChild(el);});
}
function renderLegend(){
  const wrap=document.getElementById("legend");wrap.innerHTML="";
  Object.keys(FT()).forEach(name=>{
    const recs=FT()[name];const tot=totalDays(recs);
    const btn=document.createElement("button");btn.className="leg";
    if(tot===0)btn.classList.add("is-zero");
    if(sel!==null)btn.classList.add(sel===name?"is-active":"is-dim");
    btn.innerHTML=`<span class="av">${initials(name)}</span>${name}<span class="cnt">${S().days(tot)}</span>`;
    btn.addEventListener("click",()=>{sel=(sel===name)?null:name;selMonth=null;renderLegend();renderStage();});
    wrap.appendChild(btn);
  });
}
function renderStage(){
  const stage=document.getElementById("stage");
  if(sel===null){stage.innerHTML=`<div class="prompt fade">${S().prompt}</div>`;return;}
  if(selMonth===null)renderYear(stage);else renderMonth(stage);
}
function renderYear(stage){
  const recs=FT()[sel];const byMonth={};
  recs.forEach(r=>{const m=+r.d.slice(5,7)-1;(byMonth[m]??={});(byMonth[m][r.t]??=0);byMonth[m][r.t]++;});
  let cards="";
  for(let m=0;m<12;m++){
    const data=byMonth[m];
    if(!data){cards+=`<div class="mcard is-empty"><div class="mtop"><span class="mname">${MONTH_CARD[lang][m]}</span></div><span class="none">—</span></div>`;continue;}
    const mRecs=recs.filter(r=>+r.d.slice(5,7)-1===m);
    let chips="";
    ORDER.forEach(k=>{if(data[k]){const c=cvar(TYPE_VAR[k]);chips+=`<span class="tchip" style="--c:${c}">${TYPE_LABEL[lang][k]} ${data[k]}</span>`;}});
    cards+=`<div class="mcard" data-m="${m}"><div class="mtop"><span class="mname">${MONTH_CARD[lang][m]}</span><span class="total">${S().days(totalDays(mRecs))}</span></div><div class="tchips">${chips}</div></div>`;
  }
  stage.className="stage fade";
  stage.innerHTML=`<div class="stage-head"><span class="who">${initials(sel)}</span><div><h2>${sel}</h2><div class="meta">${S().ovMeta(year)}</div></div></div><div class="months">${cards}</div>`;
  stage.querySelectorAll(".mcard[data-m]").forEach(c=>c.addEventListener("click",()=>{selMonth=+c.dataset.m;renderStage();}));
  void stage.offsetWidth;
}
function renderMonth(stage){
  const recs=FT()[sel].filter(r=>+r.d.slice(5,7)-1===selMonth);
  const map={};recs.forEach(r=>{const day=+r.d.slice(8,10);(map[day]??=[]).push(r);});
  const days=new Date(year,selMonth+1,0).getDate();
  const lead=(new Date(year,selMonth,1).getDay()+6)%7;
  let cells="";
  DOWS[lang].forEach((d)=>{cells+=`<div class="dow">${d}</div>`;});
  for(let i=0;i<lead;i++)cells+=`<div class="day blank"></div>`;
  for(let day=1;day<=days;day++){
    const rest=isRest(sel,year,selMonth,day)?"rest":"";
    const list=map[day];
    if(!list){cells+=`<div class="day ${rest}"><span class="num">${day}</span></div>`;continue;}
    if(list.length===1){
      const r=list[0];const c=cvar(TYPE_VAR[r.t]);
      cells+=`<div class="day has" style="--c:${c}"><span class="num">${day}</span>${r.h?`<span class="half">½</span>`:""}<span class="tag">${TYPE_LABEL[lang][r.t]}</span></div>`;
    }else{
      let minis="";list.forEach(r=>{const c=cvar(TYPE_VAR[r.t]);minis+=`<span class="mini" style="--c:${c}">${TYPE_SHORT[r.t]}${r.h?'½':''}</span>`;});
      cells+=`<div class="day"><span class="num">${day}</span><div class="minis">${minis}</div></div>`;
    }
  }
  const present=[...new Set(recs.map(r=>r.t))];
  let foot="";
  ORDER.filter(k=>present.includes(k)).forEach(k=>{const c=cvar(TYPE_VAR[k]);foot+=`<span class="key" style="color:${c};background:color-mix(in srgb,${c} 13%,#fff);border:1px solid color-mix(in srgb,${c} 26%,#fff)"><i style="background:${c}"></i>${TYPE_LABEL[lang][k]}</span>`;});
  const noLeaveNote=present.length?"":`<span class="meta" style="color:var(--muted);font-size:12px;align-self:center">${S().noLeave}</span>`;
  stage.className="stage fade";
  stage.innerHTML=`<div class="stage-head"><span class="who">${initials(sel)}</span><div><h2>${S().h2(sel,selMonth)}</h2><div class="meta">${S().mMeta(selMonth,year,S().days(totalDays(recs)))}</div></div><button class="back" id="backBtn">${S().back}</button></div><div class="cal-wrap"><div class="cal">${cells}</div><div class="cal-foot">${noLeaveNote}${foot}</div></div>`;
  document.getElementById("backBtn").addEventListener("click",()=>{selMonth=null;renderStage();});
  void stage.offsetWidth;
}
/* ---- upload parsing ---- */
const TYPE_ALIASES={annual:"annual","annual leave":"annual",al:"annual",mc:"mc",medical:"mc","medical leave":"mc",sick:"mc","sick leave":"mc",urgent:"urgent","urgent leave":"urgent",ul:"urgent",unpaid:"unpaid","unpaid leave":"unpaid",up:"unpaid",others:"others",other:"others",ot:"others",hospital:"others",hospitalization:"others",hospitalisation:"others"};
function pad2(n){return String(n).padStart(2,"0");}
function normDate(s){s=(s||"").trim();let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);if(m)return `${m[1]}-${pad2(m[2])}-${pad2(m[3])}`;m=s.match(/^(\d{1,2})[\/.](\d{1,2})[\/.](\d{4})$/);if(m)return `${m[3]}-${pad2(m[2])}-${pad2(m[1])}`;return null;}
function normType(s){return TYPE_ALIASES[(s||"").trim().toLowerCase()]||null;}
function isHalf(s){return /^(0\.5|\.5|half|y|yes|true|1)$/i.test(String(s||"").trim());}
function parseUpload(text){
  const rows=[],errs=[];text=(text||"").trim();if(!text)return {rows,errs};
  if(text[0]==="["||text[0]==="{"){
    try{let j=JSON.parse(text);if(!Array.isArray(j))j=[j];
      j.forEach(o=>{const date=normDate(o.date||o.d);const type=normType(o.type||o.t);const teacher=String(o.teacher||o.name||"").trim();
        if(date&&type&&teacher)rows.push({year:+date.slice(0,4),teacher,date,type,half:isHalf(o.half??o.h)});else errs.push(JSON.stringify(o));});
    }catch(e){errs.push("JSON parse error");}
    return {rows,errs};
  }
  text.split(/\r?\n/).forEach(line=>{line=line.trim();if(!line)return;if(/^teacher\s*[,\t]/i.test(line))return;
    const p=line.split(/[,\t]/).map(s=>s.trim());if(p.length<3){errs.push(line);return;}
    const teacher=p[0],date=normDate(p[1]),type=normType(p[2]),half=isHalf(p[3]);
    if(!teacher||!date||!type){errs.push(line);return;}
    rows.push({year:+date.slice(0,4),teacher,date,type,half});});
  return {rows,errs};
}
function addData(text){
  const {rows,errs}=parseUpload(text);
  const existing=new Set(custom.map(r=>r.year+"|"+r.teacher+"|"+r.date+"|"+r.type+"|"+(r.half?1:0)));
  for(const y in SEED)for(const t in SEED[y])SEED[y][t].forEach(r=>existing.add(y+"|"+t+"|"+r.d+"|"+r.t+"|"+(r.h?1:0)));
  let added=0,dup=0;
  rows.forEach(r=>{const k=r.year+"|"+r.teacher+"|"+r.date+"|"+r.type+"|"+(r.half?1:0);if(existing.has(k)){dup++;return;}existing.add(k);custom.push(r);added++;});
  saveCustom();DATA=buildData(custom);
  if(!DATA[year])year=Math.max(...Object.keys(DATA).map(Number));
  renderAll();
  return {added,dup,err:errs.length};
}
function clearData(){
  if(!custom.length)return;
  if(!confirm(lang==="en"?"Clear all uploaded data? Built-in records stay.":"清除所有上传的数据？内置记录会保留。"))return;
  custom=[];saveCustom();DATA=buildData(custom);
  if(!DATA[year])year=Math.max(...Object.keys(DATA).map(Number));
  renderAll();
}
function showStatus(res){document.getElementById("dataStatus").textContent=S().statusMsg(res);}
/* ---- events ---- */
document.getElementById("yearSeg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;year=+b.dataset.year;selMonth=null;renderAll();});
document.getElementById("langSeg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;lang=b.dataset.lang;document.documentElement.lang=lang;renderAll();});
document.getElementById("dataToggle").addEventListener("click",()=>{const p=document.getElementById("dataPanel");p.hidden=!p.hidden;});
document.getElementById("fileIn").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>showStatus(addData(rd.result));rd.readAsText(f);e.target.value="";});
document.getElementById("addBtn").addEventListener("click",()=>{const ta=document.getElementById("pasteIn");const res=addData(ta.value);if(res.added)ta.value="";showStatus(res);});
document.getElementById("clearBtn").addEventListener("click",clearData);
function renderAll(){renderYearSeg();renderChrome();renderDataBar();renderKeys();renderLegend();renderStage();}
renderAll();
</script>
